name: Publish Poller

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [slack-reply]

concurrency:
  group: publish-poller
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check for work
        id: check
        run: |
          STATUS=$(python scripts/check_publish.py --mode check)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Work status: $STATUS"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Install Claude Code CLI
        if: steps.check.outputs.status == 'feedback'
        run: npm install -g @anthropic-ai/claude-code

      - name: Process replies
        if: steps.check.outputs.status != 'nothing'
        run: python scripts/check_publish.py
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
