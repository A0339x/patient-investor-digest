<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Investor Digest — LP Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════════════════════════════ */
    :root {
      /* Color — background layers */
      --bg-base:     #07090f;
      --bg-surface:  #0d1220;
      --bg-elevated: #131d2e;
      --bg-overlay:  rgba(7,9,15,.82);

      /* Color — brand */
      --brand:       #00e5b8;
      --brand-mid:   #00b894;
      --brand-dark:  #006652;
      --brand-glow:  rgba(0,229,184,.1);
      --brand-glow2: rgba(0,229,184,.05);

      /* Color — text */
      --text-1: #dde5f0;
      --text-2: #7f93ac;
      --text-3: #3e5068;

      /* Color — border */
      --border:    rgba(255,255,255,.07);
      --border-hi: rgba(255,255,255,.13);

      /* Typography scale */
      --size-xs:   0.625rem;
      --size-sm:   0.75rem;
      --size-base: 0.9rem;
      --size-md:   1rem;
      --size-lg:   1.125rem;
      --size-xl:   1.375rem;
      --size-2xl:  1.75rem;
      --size-3xl:  2.25rem;
      --size-4xl:  3rem;

      /* Spacing */
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-12: 3rem;
      --space-16: 4rem;

      /* Radius */
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-full: 100px;

      /* Motion */
      --ease-out:  cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in:   cubic-bezier(0.4, 0, 1, 1);
      --dur-fast:  150ms;
      --dur-base:  250ms;
      --dur-slow:  500ms;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       RESET
    ═══════════════════════════════════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-base);
      color: var(--text-1);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       SCROLL PROGRESS BAR
    ═══════════════════════════════════════════════════════════════════════ */
    #progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, var(--brand-dark), var(--brand));
      z-index: 999;
      transition: width 80ms linear;
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       STICKY HEADER
    ═══════════════════════════════════════════════════════════════════════ */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-overlay);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 var(--space-6);
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }

    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      text-decoration: none;
      color: var(--text-1);
      flex-shrink: 0;
    }
    .brand-drop {
      font-size: 1.1rem;
      line-height: 1;
    }
    .brand-text {
      font-size: var(--size-base);
      font-weight: 700;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }
    .brand-divider {
      width: 1px;
      height: 14px;
      background: var(--border-hi);
    }
    .brand-sub {
      font-size: var(--size-xs);
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-3);
      white-space: nowrap;
    }

    /* Issue navigation */
    .issue-nav {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .issue-nav::-webkit-scrollbar { display: none; }

    .nav-label {
      font-size: var(--size-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-3);
      white-space: nowrap;
      margin-right: var(--space-1);
      flex-shrink: 0;
    }

    .nav-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-hi);
      background: transparent;
      color: var(--text-2);
      font-family: inherit;
      font-size: var(--size-sm);
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition:
        color var(--dur-base) var(--ease-out),
        border-color var(--dur-base) var(--ease-out),
        background var(--dur-base) var(--ease-out);
      flex-shrink: 0;
    }
    .nav-chip::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-3);
      flex-shrink: 0;
      transition: background var(--dur-base) var(--ease-out);
    }
    .nav-chip:hover {
      color: var(--text-1);
      border-color: var(--brand-dark);
    }
    .nav-chip.active {
      color: var(--brand);
      border-color: var(--brand-dark);
      background: var(--brand-glow2);
    }
    .nav-chip.active::before {
      background: var(--brand);
      box-shadow: 0 0 6px var(--brand);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       MAIN CONTENT AREA
    ═══════════════════════════════════════════════════════════════════════ */
    .content {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 var(--space-6);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       ISSUE SECTION
    ═══════════════════════════════════════════════════════════════════════ */
    .issue {
      padding: var(--space-16) 0;
    }

    .issue + .issue {
      border-top: 1px solid var(--border);
    }

    /* Latest issue has larger hero treatment */
    .issue.latest .issue-title {
      font-size: clamp(var(--size-3xl), 5vw, var(--size-4xl));
      letter-spacing: -0.04em;
    }

    /* Older issues slightly smaller */
    .issue.older .issue-title {
      font-size: clamp(var(--size-2xl), 4vw, var(--size-3xl));
      letter-spacing: -0.03em;
    }

    .issue-eyebrow {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
    }

    .issue-date {
      font-size: var(--size-sm);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--brand);
    }

    .issue-tag {
      font-size: var(--size-xs);
      font-weight: 600;
      padding: 3px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-hi);
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .issue-title {
      font-weight: 900;
      line-height: 1.08;
      color: var(--text-1);
      margin-bottom: var(--space-3);
    }

    .issue-subtitle {
      font-size: var(--size-md);
      font-weight: 300;
      color: var(--text-2);
      font-style: italic;
      line-height: 1.55;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       WEEK AT A GLANCE
    ═══════════════════════════════════════════════════════════════════════ */
    .glance {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin: var(--space-8) 0;
    }

    .glance-item {
      padding: var(--space-4) var(--space-6);
      border-right: 1px solid var(--border);
      position: relative;
    }
    .glance-item:last-child { border-right: none; }
    .glance-item::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%; right: 0;
      height: 1px;
    }

    .glance-label {
      font-size: var(--size-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      color: var(--text-3);
      margin-bottom: 6px;
    }

    .glance-value {
      font-size: var(--size-xl);
      font-weight: 800;
      color: var(--brand);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       ISSUE INTRO
    ═══════════════════════════════════════════════════════════════════════ */
    .issue-intro {
      font-size: var(--size-lg);
      font-weight: 400;
      line-height: 1.8;
      color: var(--text-2);
      padding-bottom: var(--space-8);
      border-bottom: 1px solid var(--border);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       STORIES
    ═══════════════════════════════════════════════════════════════════════ */
    .stories {
      display: flex;
      flex-direction: column;
    }

    .story {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 0 var(--space-6);
      padding: var(--space-8) 0;
      border-bottom: 1px solid var(--border);
    }
    .story:last-child { border-bottom: none; }

    .story-num {
      font-size: 2.25rem;
      font-weight: 900;
      line-height: 1;
      color: var(--brand-dark);
      letter-spacing: -0.06em;
      padding-top: 2px;
      opacity: 0.7;
      font-variant-numeric: tabular-nums;
    }

    .story-body-wrap {}

    .story-title {
      font-size: var(--size-xl);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.3;
      color: var(--text-1);
      margin-bottom: var(--space-4);
    }

    .story-body {
      font-size: var(--size-base);
      line-height: 1.85;
      color: var(--text-2);
      margin-bottom: var(--space-4);
    }

    .story-spark {
      background: var(--brand-glow);
      border-left: 2px solid var(--brand);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      padding: var(--space-4) var(--space-4) var(--space-4) var(--space-6);
    }

    .spark-label {
      font-size: var(--size-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--brand-mid);
      margin-bottom: 5px;
    }

    .spark-text {
      font-size: var(--size-base);
      color: var(--text-1);
      line-height: 1.7;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       ISSUE CLOSING
    ═══════════════════════════════════════════════════════════════════════ */
    .issue-closing {
      margin-top: var(--space-8);
      padding: var(--space-6);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: var(--size-base);
      line-height: 1.75;
      color: var(--text-2);
      font-style: italic;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       SCROLL-TO-TOP
    ═══════════════════════════════════════════════════════════════════════ */
    #scroll-top {
      position: fixed;
      bottom: var(--space-8);
      right: var(--space-8);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 1px solid var(--border-hi);
      color: var(--text-2);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition:
        opacity var(--dur-base) var(--ease-out),
        color var(--dur-base) var(--ease-out),
        border-color var(--dur-base) var(--ease-out),
        transform var(--dur-base) var(--ease-out);
      z-index: 50;
    }
    #scroll-top.show {
      opacity: 1;
      pointer-events: auto;
    }
    #scroll-top:hover {
      color: var(--brand);
      border-color: var(--brand-dark);
      transform: translateY(-2px);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════════════════════════════════ */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: var(--space-12) var(--space-6);
      text-align: center;
      color: var(--text-3);
      font-size: var(--size-sm);
      line-height: 2;
    }
    .site-footer strong {
      color: var(--text-2);
      font-weight: 600;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       FADE-IN ANIMATION
    ═══════════════════════════════════════════════════════════════════════ */
    .reveal {
      opacity: 0;
      transform: translateY(16px);
      transition:
        opacity var(--dur-slow) var(--ease-out),
        transform var(--dur-slow) var(--ease-out);
    }
    .reveal.in {
      opacity: 1;
      transform: none;
    }
    /* Stagger delay for children */
    .reveal[data-delay="1"] { transition-delay: 60ms; }
    .reveal[data-delay="2"] { transition-delay: 120ms; }
    .reveal[data-delay="3"] { transition-delay: 180ms; }
    .reveal[data-delay="4"] { transition-delay: 240ms; }
    .reveal[data-delay="5"] { transition-delay: 300ms; }

    /* ═══════════════════════════════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════════════════════════════ */
    @media (max-width: 700px) {
      .brand-divider,
      .brand-sub,
      .nav-label { display: none; }

      .story {
        grid-template-columns: 1fr;
      }
      .story-num {
        font-size: 1.25rem;
        margin-bottom: var(--space-2);
      }

      .glance {
        grid-template-columns: repeat(2, 1fr);
      }
      .glance-item:nth-child(2) { border-right: none; }
      .glance-item:nth-child(1),
      .glance-item:nth-child(2) {
        border-bottom: 1px solid var(--border);
      }

      .issue { padding: var(--space-12) 0; }

      #scroll-top { bottom: var(--space-4); right: var(--space-4); }
    }
  </style>
</head>
<body>

  <!-- Progress bar -->
  <div id="progress-bar"></div>

  <!-- ── HEADER ────────────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="#top">
        <span class="brand-drop">💧</span>
        <span class="brand-text">Patient Investor Digest</span>
        <span class="brand-divider"></span>
        <span class="brand-sub">LP Intelligence</span>
      </a>
      <nav class="issue-nav" id="issue-nav" aria-label="Jump to issue">
        <span class="nav-label">Issues</span>
        <!-- injected by JS -->
      </nav>
    </div>
  </header>

  <!-- ── CONTENT ───────────────────────────────────────────────── -->
  <div class="content" id="top">
    <!-- issues injected by JS -->
  </div>

  <!-- ── FOOTER ────────────────────────────────────────────────── -->
  <footer class="site-footer">
    <strong>💧 Patient Investor Digest</strong><br>
    LP Mastermind Edition &nbsp;·&nbsp; Published every Monday &amp; Thursday<br>
    Concentrated liquidity intelligence for serious LPs.
  </footer>

  <!-- Scroll-to-top -->
  <button id="scroll-top" aria-label="Scroll to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <!-- ════════════════════════════════════════════════════════════════
       DATA — add new issues to the TOP of this array (newest first)
  ════════════════════════════════════════════════════════════════ -->
  <script>
  const DIGESTS = [
    {
      id: "april-16-2026",
      date: "April 16, 2026",
      title: "LP Mastermind\nMarket Update",
      subtitle: "What moved this week, what it means for your ranges, and what's worth talking about.",
      snapshot: [
        { label: "BTC",        value: "+2.9%" },
        { label: "ETH",        value: "+5.6%" },
        { label: "Volatility", value: "Spike → compress" },
        { label: "ETH Gas",    value: "~$0.01" }
      ],
      intro: "A geopolitical shock mid-week (Strait of Hormuz closure → ceasefire) created a classic volatility burst followed by a sharp directional move. For LPs, that's the week in a nutshell: wide swings, then a reset.",
      stories: [
        {
          title: "Volatility Spike, Then Whipsaw — How Did Your Ranges Hold?",
          body:  "The Middle East ceasefire on April 7–8 triggered a fast 5–6% move up in ETH almost overnight, following a week of macro-driven suppression from energy price spikes and CPI coming in hot at 3.3%. If you were running tight ranges through the spike, you likely went out of range and missed the fee window. If you were running wider ranges anticipating macro uncertainty, this was a solid fee-generating week.",
          spark: "What range widths are you running right now given the macro backdrop — tighter for fees, or wider for resilience? Did anyone get caught out of range during the April 7 move?"
        },
        {
          title: "Aave V4 Live + Gas at Record Lows — Rebalancing Just Got Cheaper",
          body:  "Aave V4 launched on Ethereum Mainnet this week, and Ethereum gas fees are sitting at an all-time low of ~$0.01. For V3/V4 LPs, this matters practically: rebalancing positions, collecting fees, and adjusting ranges is effectively free right now compared to even 12 months ago. If you've been avoiding frequent range adjustments because of gas costs, that friction is largely gone.",
          spark: "Has cheap gas changed how often you're adjusting ranges? Or are you still managing positions the same way regardless?"
        },
        {
          title: "Apollo Global Enters DeFi Lending — What Institutional Liquidity Means for Pools",
          body:  "Apollo Global Management partnered with Morpho to provide on-chain lending liquidity, with rights to acquire 90 million MORPHO tokens. Separately, the $12.5 trillion global repo market is beginning to settle on Ethereum. As institutional capital flows into DeFi, it changes the liquidity landscape — deeper pools, tighter spreads, and potentially lower fee yields in the most competitive pairs as more LPs compete for the same volume.",
          spark: "Are you already seeing yield compression on major pairs like ETH/USDC? Is institutional liquidity pushing you toward niche pools or longer-tail pairs to find better returns?"
        },
        {
          title: "SEC Unlocks DeFi Front-Ends — More On-Chain Volume Coming",
          body:  "The SEC ruled on April 13 that DeFi user interface providers don't need to register as broker-dealers — a major legal unlock that removes a key barrier for compliant DeFi products to go mainstream. More on-chain users and volume is ultimately good for LPs: more swaps = more fees. This follows the March SEC/CFTC joint framework that gave crypto assets a formal legal taxonomy for the first time.",
          spark: "Do you factor regulatory clarity into which chains or protocols you LP on? Does this change your confidence in Ethereum-based pools specifically?"
        },
        {
          title: "V4 Hooks Are Live — The Next Frontier for LP Strategy",
          body:  "With Aave V4's launch reinforcing the Ethereum ecosystem, Uniswap V4's hook architecture is increasingly where LP strategy innovation is happening. Hooks allow pool creators to build custom logic — dynamic fee tiers, auto-rebalancing, TWAP-based range adjustments — directly into the pool. Early hook-enabled pools are beginning to emerge with meaningfully different risk/return profiles than standard V3 positions.",
          spark: "Is anyone experimenting with V4 hook pools yet? What custom logic would actually change how you LP — dynamic fees, auto-range shifting, something else?"
        }
      ],
      closing: "What are you watching going into next week? Drop your current setups, pairs, and range thoughts in the group."
    }
  ];

  /* ── BUILD NAV CHIPS ──────────────────────────────────────────────── */
  function buildNav() {
    const nav = document.getElementById('issue-nav');
    DIGESTS.forEach((d, i) => {
      const a = document.createElement('a');
      a.href = '#' + d.id;
      a.className = 'nav-chip' + (i === 0 ? ' active' : '');
      a.dataset.id = d.id;
      a.textContent = d.date;
      a.addEventListener('click', e => {
        e.preventDefault();
        document.getElementById(d.id)?.scrollIntoView({ behavior: 'smooth' });
      });
      nav.appendChild(a);
    });
  }

  /* ── BUILD ISSUE SECTIONS ─────────────────────────────────────────── */
  function buildIssues() {
    const container = document.getElementById('top');

    DIGESTS.forEach((d, idx) => {
      const section = document.createElement('section');
      section.className = 'issue ' + (idx === 0 ? 'latest' : 'older');
      section.id = d.id;

      const titleLines = d.title.split('\n').join('<br>');

      const glanceHTML = d.snapshot.map(s => `
        <div class="glance-item reveal" data-delay="${d.snapshot.indexOf(s) + 1}">
          <div class="glance-label">${s.label}</div>
          <div class="glance-value">${s.value}</div>
        </div>
      `).join('');

      const storiesHTML = d.stories.map((s, i) => `
        <div class="story reveal" data-delay="${Math.min(i + 1, 5)}">
          <div class="story-num">0${i + 1}</div>
          <div class="story-body-wrap">
            <div class="story-title">${s.title}</div>
            <div class="story-body">${s.body}</div>
            <div class="story-spark">
              <div class="spark-label">💬 For the group</div>
              <div class="spark-text">${s.spark}</div>
            </div>
          </div>
        </div>
      `).join('');

      section.innerHTML = `
        <div class="issue-eyebrow reveal">
          <span class="issue-date">${d.date}</span>
          <span class="issue-tag">LP Mastermind Edition</span>
        </div>
        <h1 class="issue-title reveal" data-delay="1">${titleLines}</h1>
        <p class="issue-subtitle reveal" data-delay="2">${d.subtitle}</p>
        <div class="glance reveal" data-delay="3">
          ${d.snapshot.map(s => `
            <div class="glance-item">
              <div class="glance-label">${s.label}</div>
              <div class="glance-value">${s.value}</div>
            </div>
          `).join('')}
        </div>
        <p class="issue-intro reveal" data-delay="4">${d.intro}</p>
        <div class="stories">${storiesHTML}</div>
        <div class="issue-closing reveal">${d.closing}</div>
      `;

      container.appendChild(section);
    });
  }

  /* ── INTERSECTION OBSERVER: FADE-IN ──────────────────────────────── */
  function initReveal() {
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.07 });

    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  }

  /* ── INTERSECTION OBSERVER: ACTIVE NAV ───────────────────────────── */
  function initActiveNav() {
    const chips = () => document.querySelectorAll('.nav-chip');

    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          chips().forEach(c => c.classList.remove('active'));
          const chip = document.querySelector(`.nav-chip[data-id="${e.target.id}"]`);
          if (chip) chip.classList.add('active');
        }
      });
    }, { rootMargin: '-25% 0px -65% 0px' });

    document.querySelectorAll('.issue').forEach(s => io.observe(s));
  }

  /* ── SCROLL: PROGRESS BAR + SCROLL-TO-TOP ─────────────────────────── */
  function initScroll() {
    const bar = document.getElementById('progress-bar');
    const btn = document.getElementById('scroll-top');
    let ticking = false;

    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => {
          const pct = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
          bar.style.width = Math.min(pct, 100) + '%';
          btn.classList.toggle('show', window.scrollY > 500);
          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });
  }

  /* ── INIT ─────────────────────────────────────────────────────────── */
  buildNav();
  buildIssues();
  // Small delay so elements are in DOM before observing
  requestAnimationFrame(() => {
    initReveal();
    initActiveNav();
    initScroll();
  });
  </script>

</body>
</html>
